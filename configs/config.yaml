# Wanjiku TTS Configuration

stream:
  url: ""  # Set your Kikuyu radio stream URL here
  format: mp3
  sample_rate: 24000

audio:
  target_sample_rate: 24000
  channels: 1
  min_duration: 3.0    # seconds
  max_duration: 15.0
  target_lufs: -23.0   # EBU R128

data:
  waxal_dir: data/waxal_kikuyu
  radio_raw_dir: data/radio_raw
  radio_clean_dir: data/radio_clean
  transcripts_dir: data/transcripts
  manifest: data/transcripts/manifest.jsonl

aws:
  s3_bucket: wanjiku-tts-971994957690
  region: us-east-1
  instance_id: i-076aaa7423b670d2a

model:
  base: Qwen/Qwen3-TTS-12Hz-1.7B-Base
  checkpoint_dir: models/checkpoints

training:
  phase1:  # WAXAL Kikuyu adaptation
    learning_rate: 1.0e-5
    batch_size: 8
    gradient_accumulation_steps: 4
    warmup_steps: 500
    max_steps: 50000
    fp16: true
  phase2:  # broadcast voice style
    learning_rate: 5.0e-6
    batch_size: 4
    gradient_accumulation_steps: 4
    warmup_steps: 200
    max_steps: 10000
    fp16: true
